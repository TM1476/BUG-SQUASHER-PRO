<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bug Squasher: High Score Edition</title>
    <style>
        :root {
            --primary: #818cf8;
            --danger: #f87171;
            --success: #4ade80;
            --bg: #0f172a;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: white;
            text-align: center;
            margin: 0;
            padding: 10px;
            overflow: hidden;
            touch-action: manipulation;
        }

        .header { margin: 10px 0; }
        .high-score-label { color: #fbbf24; font-size: 1rem; font-weight: bold; }

        .stats {
            display: flex;
            justify-content: space-around;
            max-width: 500px;
            margin: 10px auto;
            background: #1e293b;
            padding: 15px;
            border-radius: 20px;
            border: 1px solid #334155;
        }

        .stat-item { display: flex; flex-direction: column; }
        .val { font-size: 1.5rem; font-weight: 800; color: var(--primary); }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            max-width: 380px;
            margin: 15px auto;
            aspect-ratio: 1/1;
        }

        .hole {
            background: #020617;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            border: 4px solid #334155;
            box-shadow: inset 0 10px 20px rgba(0,0,0,0.8);
        }

        .bug {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 100%; 
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
            cursor: pointer;
            transition: top 0.1s ease-out;
            user-select: none;
        }

        .bug.up { top: 10%; }

        .btn {
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            margin: 10px;
        }

        .btn-start { background: var(--primary); color: white; box-shadow: 0 4px 15px rgba(129, 140, 248, 0.4); }
        .btn-retry { background: var(--success); color: #064e3b; display: none; }

        #winOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .celebrate-text { font-size: 3rem; color: var(--success); animation: bounce 0.5s infinite alternate; }
        @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.1); } }
    </style>
</head>
<body>

    <div id="winOverlay">
        <h1 class="celebrate-text">🎉 CHAMPION! 🎉</h1>
        <p>You smashed 100 bugs!</p>
        <button class="btn btn-retry" style="display:block" onclick="location.reload()">PLAY AGAIN</button>
    </div>

    <div class="header">
        <h1>BUG SQUASHER <span style="color:var(--primary)">PRO</span></h1>
        <div class="high-score-label">BEST: <span id="highScore">0</span></div>
    </div>

    <div class="stats">
        <div class="stat-item"><span>Score</span><span id="score" class="val">0</span></div>
        <div class="stat-item"><span>Lives</span><span id="lives" class="val">❤️❤️❤️❤️❤️</span></div>
    </div>

    <div class="grid">
        <div class="hole"><div class="bug">🐛</div></div>
        <div class="hole"><div class="bug">🐛</div></div>
        <div class="hole"><div class="bug">🐛</div></div>
        <div class="hole"><div class="bug">🐛</div></div>
        <div class="hole"><div class="bug">🐛</div></div>
        <div class="hole"><div class="bug">🐛</div></div>
        <div class="hole"><div class="bug">🐛</div></div>
        <div class="hole"><div class="bug">🐛</div></div>
        <div class="hole"><div class="bug">🐛</div></div>
    </div>

    <button class="btn btn-start" id="startBtn">START MISSION</button>

    <script>
        const bugs = document.querySelectorAll('.bug');
        const holes = document.querySelectorAll('.hole');
        const scoreBoard = document.querySelector('#score');
        const highBoard = document.querySelector('#highScore');
        const livesBoard = document.querySelector('#lives');
        const startBtn = document.querySelector('#startBtn');
        const winOverlay = document.querySelector('#winOverlay');

        let score = 0;
        let lives = 5;
        let gameActive = false;
        let lastHole;
        let peepTimeout;

        let highScore = localStorage.getItem('bugHighScore') || 0;
        highBoard.textContent = highScore;

        function updateHighScore() {
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('bugHighScore', highScore);
                highBoard.textContent = highScore;
            }
        }

        function randomHole() {
            const idx = Math.floor(Math.random() * holes.length);
            const hole = holes[idx];
            if (hole === lastHole) return randomHole();
            lastHole = hole;
            return hole;
        }

        function peep() {
            if (!gameActive) return;
            const hole = randomHole();
            const bug = hole.querySelector('.bug');
            
            bug.innerText = "🐛";
            bug.classList.add('up');

            const duration = Math.max(350, 800 - (score * 4));

            peepTimeout = setTimeout(() => {
                bug.classList.remove('up');
                if (gameActive) peep();
            }, duration);
        }

        function whack(e) {
            if (!gameActive || !this.classList.contains('up')) return;
            
            score++;
            updateHighScore();
            scoreBoard.textContent = score;
            this.classList.remove('up');
            this.innerText = "💥";

            if (score === 100) {
                gameActive = false;
                winOverlay.style.display = 'flex';
            }
        }

        function miss(e) {
            if (!gameActive) return;
            if (e.target.classList.contains('hole')) {
                lives--;
                livesBoard.innerText = "❤️".repeat(Math.max(0, lives));
                document.body.style.background = "#450a0a";
                setTimeout(() => document.body.style.background = "#0f172a", 100);

                if (lives <= 0) {
                    gameActive = false;
                    alert("GAME OVER! Final Score: " + score);
                    location.reload();
                }
            }
        }

        startBtn.addEventListener('click', () => {
            score = 0;
            lives = 5;
            gameActive = true;
            startBtn.style.display = 'none';
            peep();
        });

        bugs.forEach(bug => {
            bug.addEventListener('mousedown', whack);
            bug.addEventListener('touchstart', (e) => { e.preventDefault(); whack.call(bug); });
        });

        holes.forEach(hole => {
            hole.addEventListener('mousedown', miss);
        });

    </script>
</body>
</html>
